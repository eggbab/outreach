<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <title>Outreach DM</title>
</head>
<body>
  <!-- 로그인 섹션 -->
  <div id="login-section" class="section">
    <h1>Outreach DM</h1>
    <p class="subtitle">Instagram DM 자동 발송</p>
    <div class="form-group">
      <label for="server-url">서버 주소</label>
      <input type="text" id="server-url" placeholder="http://localhost:8000" value="http://localhost:8000">
    </div>
    <div class="form-group">
      <label for="email">이메일</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label for="password">비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호">
    </div>
    <button id="login-btn" class="btn btn-primary btn-full">로그인</button>
    <p id="login-error" class="error hidden"></p>
  </div>

  <!-- 메인 대시보드 -->
  <div id="main-section" class="section hidden">
    <div class="header">
      <h1>Outreach DM</h1>
      <button id="logout-btn" class="btn btn-text">로그아웃</button>
    </div>

    <!-- 연결 상태 -->
    <div class="status-bar">
      <span id="connection-status" class="status-dot status-connected"></span>
      <span id="connection-text">서버 연결됨</span>
    </div>

    <!-- 통계 카드 -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="dm-count">0</div>
        <div class="stat-label">오늘 발송</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="dm-limit">15</div>
        <div class="stat-label">일일 한도</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="queue-size">0</div>
        <div class="stat-label">대기열</div>
      </div>
    </div>

    <!-- 발송 상태 -->
    <div id="sending-status" class="sending-status hidden">
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p id="sending-text" class="sending-text">발송 중...</p>
    </div>

    <!-- 컨트롤 버튼 -->
    <div class="controls">
      <button id="start-btn" class="btn btn-primary btn-full">DM 발송 시작</button>
      <button id="stop-btn" class="btn btn-danger btn-full hidden">발송 중지</button>
    </div>

    <!-- 최근 발송 로그 -->
    <div class="log-section">
      <h3>최근 발송</h3>
      <div id="log-list" class="log-list">
        <p class="log-empty">발송 내역이 없습니다.</p>
      </div>
    </div>
  </div>

  <script src="../utils/api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
